<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Fluxo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <section id="step-login" class="step active">
            <h2>Login</h2>
            <form id="form-login">
                <input type="text" id="user" placeholder="Usuário (admin)" required>
                <input type="password" id="pass" placeholder="Senha (1234)" required>
                <button type="submit">Entrar</button>
            </form>
        </section>

        <section id="step-cliente" class="step">
            <h2>Cadastro de Cliente</h2>
            <form id="form-cliente">
                <input type="text" placeholder="Nome do Cliente" required>
                <input type="email" placeholder="E-mail" required>
                <button type="submit">Próximo: Cadastrar Produto</button>
            </form>
        </section>

        <section id="step-estoque" class="step">
            <h2>Estoque de Produto</h2>
            <form id="form-estoque">
                <input type="text" placeholder="Nome do Produto" required>
                <input type="number" placeholder="Quantidade" required>
                <button type="submit">Finalizar Tudo</button>
            </form>
        </section>

        <section id="step-fim" class="step">
            <h2>Sucesso!</h2>
            <p>Todos os dados foram registrados.</p>
            <button onclick="location.reload()">Reiniciar Fluxo</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
