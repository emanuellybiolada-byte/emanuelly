<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="form-cadastro">
            <h2>Cadastro de Cliente</h2>
            <p>Preencha os dados abaixo para continuar.</p>
            <hr>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00">
                </div>
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                </div>
            </div>

            <button type="submit" class="btn-enviar">Finalizar Cadastro</button>
        </form>
    </div>

    <div class="container lista-container">
        <h3>Clientes Cadastrados</h3>
        <table id="tabela-clientes">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('form-cadastro');
        const tabela = document.querySelector('#tabela-clientes tbody');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Impede a página de recarregar

            // Pega os valores dos inputs
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;

            // Cria uma nova linha (tr) na tabela
            const novaLinha = document.createElement('tr');

            novaLinha.innerHTML = `
                <td>${nome}</td>
                <td>${email}</td>
                <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">Excluir</button></td>
            `;

            // Adiciona a linha na tabela
            tabela.appendChild(novaLinha);

            // Limpa o formulário
            form.reset();
        });
    </script>
</body>
</html>
